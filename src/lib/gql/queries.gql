fragment TextWithImageFragment on TextWithImage {
  reverseLayout
  applyBackground
  subtitle
  title
  titleLevel
  contentRaw
  links {
    label
    href
  }
  image {
    image {
      asset {
        ...imageAsset
        metadata {
          lqip
        }
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
  }
}

fragment ContentBlockFragment on ContentBlocks {
  contentblocks {
    ... on TextWithImage {
      ...TextWithImageFragment
    }
  }
}

query GetHome {
  allHome {
    mobileHeroImages {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    heroImages {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    heroHeadline
    copySubtitle
    copyTitle
    copyRaw
    copyImage {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    contentBlocks {
      ... on ContentBlocks {
        ...ContentBlockFragment
      }
    }
    projectsSubtitle
    featuredProjects {
      title
      slug {
        current
      }
      featuredProjectGallery {
        asset {
          ...imageAsset
        }
        hotspot {
          ...imageHotspot
        }
        crop {
          ...imageCrop
        }
      }
      gallery {
        asset {
          ...imageAsset
        }
        hotspot {
          ...imageHotspot
        }
        crop {
          ...imageCrop
        }
      }
    }
    gallery {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    slug {
      current
    }
    seo {
      ...seo
    }
  }
  testimonials: allTestimonial {
    testimonial
    testimonialAuthor
  }
}

