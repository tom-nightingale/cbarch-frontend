query GetProjectSingleton {
  page: allProjects {
    introSubtitle
    introTitle
    introCopyRaw
    slug {
      current
    }
    contentBlocks {
      ... on ContentBlocks {
        ...ContentBlockFragment
      }
    }
    seo {
      ...seo
    }
  }
  projects: allProject(sort: [{ orderRank: ASC }]) {
    heroImages {
      asset {
        ...imageAsset
      }
      crop {
        ...imageCrop
      }
      hotspot {
        ...imageHotspot
      }
    }
    title
    projectLocation
    slug {
      current
    }
    seo {
      ...seo
    }
  }
}

query GetProject($slug: String) {
  project: allProject(where: { slug: { current: { eq: $slug } } }) {
    mobileHeroImages {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    heroImages {
      asset {
        ...imageAsset
      }
      crop {
        ...imageCrop
      }
      hotspot {
        ...imageHotspot
      }
    }
    title
    projectCopyRaw
    projectCopyImage {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    projectLocation
    projectValue
    projectInvolvement
    gallery {
      asset {
        ...imageAsset
      }
      crop {
        ...imageCrop
      }
      hotspot {
        ...imageHotspot
      }
    }
    slug {
      current
    }
    seo {
      ...seo
    }
    contentBlocks {
      ... on ContentBlocks {
        ...ContentBlockFragment
      }
    }
  }
}

fragment NavigationSection on NavigationSection {
  target {
    ... on Page {
      title
      slug {
        current
      }
    }
    ... on Home {
      title
      slug {
        current
      }
    }
    ... on About {
      title
      slug {
        current
      }
    }
    ... on Projects {
      title
      slug {
        current
      }
    }
    ... on Team {
      title
      slug {
        current
      }
    }
    ... on Page {
      title
      slug {
        current
      }
    }
  }
  children {
    title
    target {
      ... on Home {
        title
        slug {
          current
        }
      }
      ... on About {
        title
        slug {
          current
        }
      }
      ... on Projects {
        title
        slug {
          current
        }
      }
      ... on Team {
        title
        slug {
          current
        }
      }
      ... on Page {
        title
        slug {
          current
        }
      }
    }
  }
}

query GetNavigationById($id: ID!) {
  Navigation(id: $id) {
    _id
    title
    sections {
      ...NavigationSection
    }
  }
}

query GetPageBySlug($slug: String) {
  page: allPage(where: { slug: { current: { eq: $slug } } }) {
    _id
    title
    contentBlocks {
      ... on ContentBlocks {
        ...ContentBlockFragment
      }
    }
    seo {
      ...seo
    }
  }
}
