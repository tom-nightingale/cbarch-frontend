    }
    thirdSubtitle
    thirdTitle
    thirdCopyRaw
    thirdCopyImage {
      asset {
        ...imageAsset
      }
      hotspot {
        ...imageHotspot
      }
      crop {
        ...imageCrop
      }
    }
    slug {
      current
    }
    seo {
      ...seo
    }
    contentBlocks {
      ... on ContentBlocks {
        ...ContentBlockFragment
      }
    }
  }
}

